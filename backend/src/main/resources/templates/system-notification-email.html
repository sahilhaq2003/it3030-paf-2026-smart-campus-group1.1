<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}}</title>
  </head>
  <body style="margin:0; padding:0; background:#f5f7fb; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;">
      <tr>
        <td align="center" style="padding:24px 12px;">
          <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px; max-width:100%; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);">
            <tr>
              <td style="padding:18px 22px; background: linear-gradient(90deg, #4f46e5, #7c3aed);">
                <div style="font-size:14px; color:#ffffff; opacity:0.95; letter-spacing:0.02em;">Smart Campus</div>
                <div style="margin-top:6px; font-size:20px; font-weight:700; color:#ffffff;">{{title}}</div>
              </td>
            </tr>

            <tr>
              <td style="padding:22px 22px 8px;">
                <div style="font-size:14px; color:#475569; line-height:1.5;">Hello {{recipientName}},</div>
              </td>
            </tr>

            <tr>
              <td style="padding:0 22px 16px;">
                <div style="font-size:15px; color:#0f172a; line-height:1.6; white-space:pre-wrap;">
                  {{message}}
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding:0 22px 18px;">
                <div style="display:inline-block; padding:10px 12px; background:#f1f5ff; border:1px solid #e5e7ff; border-radius:12px; font-size:13px; color:#3730a3;">
                  Reference: {{reference}}
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding:0 22px 22px;">
                <div style="font-size:12.5px; color:#64748b; line-height:1.5;">
                  <strong>Do not reply to this email.</strong><br/>
                  This is a system generated notification email.
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding:16px 22px; border-top:1px solid #eef2ff; background:#fafbff;">
                <div style="font-size:12px; color:#64748b;">
                  Smart Campus Team
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
