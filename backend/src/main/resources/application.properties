# Server
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db
spring.datasource.username=campus_user
spring.datasource.password=campus123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/tickets

# JWT (Member 4 will set this up, use this for now)
app.jwt.secret=your-secret-key-here-make-it-long-32chars
app.jwt.expiration=86400000

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Scheduling
spring.task.scheduling.enabled=true

# -----------------------------
# System Emails (SMTP)
# -----------------------------
# Enable in backend/.env (or via OS env vars):
# APP_MAIL_ENABLED=true
# SPRING_MAIL_USERNAME=your-gmail-address
# SPRING_MAIL_PASSWORD=your-google-app-password
# APP_MAIL_FROM=your-gmail-address (optional; defaults to SPRING_MAIL_USERNAME)
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
