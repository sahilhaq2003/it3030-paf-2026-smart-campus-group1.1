# Server
server.port=8081

# Database — Supabase (backend/.env). Session pooler = IPv4. Set SUPABASE_POOLER_REGION or DATABASE_URL in .env.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.mitsbnqagfaqhkyrsanr}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads/tickets

# JWT (Member 4 will set this up, use this for now)
app.jwt.secret=your-secret-key-here-make-it-long-32chars
app.jwt.expiration=86400000

# Google Sign-In — Web client ID (same as VITE_GOOGLE_CLIENT_ID). Optional: omit for simulated-only /dev.
app.google.client-id=${GOOGLE_CLIENT_ID:}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Scheduling
spring.task.scheduling.enabled=true
