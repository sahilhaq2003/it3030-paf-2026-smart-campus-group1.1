##################################################################
# Server
server.port=8081

# Database — Supabase (Supavisor).
# Port 6543 = TRANSACTION mode (recommended for Spring/Hibernate)
# Uses environment variables for security (no hardcoded passwords)

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Run schema.sql after Hibernate bootstraps (adds any columns ddl-auto missed)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

