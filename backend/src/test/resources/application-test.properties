# In-memory DB for @ActiveProfiles("test") — no Supabase credentials required.
spring.datasource.url=jdbc:h2:mem:smartcampus_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

spring.jpa.show-sql=false

app.jwt.secret=01234567890123456789012345678901
app.google.client-id=

supabase.url=http://localhost
supabase.service-key=test-key
